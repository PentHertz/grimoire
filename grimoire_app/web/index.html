<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grimoire - offensive knowledge, offline</title>
<style>
  :root{--bg:#0e0f13;--panel:#14161c;--line:#23262e;--fg:#d7dadf;--mut:#8b91a0;
        --accent:#c9a3ff;--accent2:#79b8ff;--hit:#5b4b00}
  *{box-sizing:border-box}
  body{margin:0;height:100vh;display:flex;flex-direction:column;background:var(--bg);
       color:var(--fg);font:15px/1.5 system-ui,Segoe UI,sans-serif}
  header{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--line)}
  .logo{font-weight:800;letter-spacing:.5px;color:var(--accent);font-size:20px;white-space:nowrap}
  .logo small{color:var(--mut);font-weight:500;font-size:12px;letter-spacing:0}
  #q{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--fg);
     font-size:16px;padding:10px 14px;border-radius:8px;outline:none}
  #q:focus{border-color:var(--accent2)}
  #cats{display:flex;flex-wrap:wrap;gap:6px;padding:8px 18px;border-bottom:1px solid var(--line)}
  .chip{font-size:12px;color:var(--mut);background:var(--panel);border:1px solid var(--line);
        padding:4px 10px;border-radius:999px;cursor:pointer;user-select:none}
  .chip.on{color:#0e0f13;background:var(--accent);border-color:var(--accent);font-weight:600}
  main{flex:1;display:flex;min-height:0}
  #results{width:42%;max-width:560px;overflow:auto;border-right:1px solid var(--line)}
  #viewer{flex:1;border:0;background:#0e0f13}
  .hit{padding:10px 16px;border-bottom:1px solid var(--line);cursor:pointer}
  .hit:hover{background:#171a21}
  .hit.sel{background:#1d2230}
  .hit .t{color:var(--accent2);font-weight:600}
  .hit .m{font-size:11px;color:var(--mut);margin:2px 0;text-transform:uppercase;letter-spacing:.4px}
  .hit .s{font-size:13px;color:#aeb4c0}
  .hit .s mark{background:var(--hit);color:#ffe08a;border-radius:2px}
  .src{display:inline-block;font-size:10px;color:var(--accent);border:1px solid #2c2740;
       border-radius:4px;padding:0 5px;margin-left:6px}
  .empty{padding:40px 18px;color:var(--mut);text-align:center}
  footer{padding:6px 18px;border-top:1px solid var(--line);color:var(--mut);font-size:12px;
         display:flex;align-items:center;gap:10px}
  footer .credit{margin-left:auto}
  footer a{color:var(--accent);text-decoration:none} footer a:hover{text-decoration:underline}
  kbd{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:0 5px}
  #upd{background:var(--panel);border:1px solid var(--line);color:var(--fg);border-radius:8px;
       padding:9px 14px;font-size:13px;cursor:pointer;white-space:nowrap}
  #upd:hover{border-color:var(--accent)} #upd:disabled{opacity:.6;cursor:wait}
  #updlog{flex:1;color:var(--mut);font:11px/1.4 ui-monospace,monospace;
          white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
  <header>
    <div class="logo"> GRIMOIRE <small>offensive knowledge, offline</small></div>
    <input id="q" placeholder="cast a spell...  sql - ssrf - xss - kerberoast - lsass - sudo - jwt" autofocus>
    <button id="upd" title="git pull every source and rebuild the search index">Update docs</button>
  </header>
  <div id="cats"></div>
  <main>
    <div id="results"><div class="empty">Type to search across every indexed source.</div></div>
    <iframe id="viewer" title="document"></iframe>
  </main>
  <footer><span id="stat">ready</span> - <kbd>/</kbd> focus - <kbd>Esc</kbd> clear <span id="updlog"></span>
    <span class="credit">GRIMOIRE - <a href="https://penthertz.com" target="_blank" rel="noopener">Penthertz</a> - part of the RF-Swift toolkit</span>
  </footer>

<script>
const q = document.getElementById('q'), results = document.getElementById('results'),
      viewer = document.getElementById('viewer'), stat = document.getElementById('stat'),
      catsEl = document.getElementById('cats');
let activeCat = '', timer = null;

async function loadCats(){
  const cats = await (await fetch('/api/sources')).json();
  const mk = (label,val)=>{const c=document.createElement('span');c.className='chip'+(val===activeCat?' on':'');
    c.textContent=label;c.onclick=()=>{activeCat=(activeCat===val?'':val);loadCats();search();};return c;};
  catsEl.innerHTML='';
  catsEl.appendChild(mk('all','',));
  Object.keys(cats).sort().forEach(c=>catsEl.appendChild(mk(c,c)));
}
function esc(s){return (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function open(src,path,el){
  [...results.children].forEach(c=>c.classList.remove('sel')); el && el.classList.add('sel');
  viewer.src='/doc?src='+encodeURIComponent(src)+'&path='+encodeURIComponent(path);
}
async function search(){
  const term=q.value.trim();
  if(!term){results.innerHTML='<div class="empty">Type to search across every indexed source.</div>';stat.textContent='ready';return;}
  stat.textContent='searching...';
  const r=await (await fetch('/api/search?q='+encodeURIComponent(term)+'&cat='+encodeURIComponent(activeCat))).json();
  stat.textContent=r.length?(r.length+' hit'+(r.length>1?'s':'')+' for "'+term+'"'):'no hits for "'+term+'"';
  if(!r.length){results.innerHTML='<div class="empty">No matches. Try a broader term.</div>';return;}
  results.innerHTML='';
  r.forEach(h=>{
    const d=document.createElement('div');d.className='hit';
    d.innerHTML='<div class="t">'+esc(h.title)+'<span class="src">'+esc(h.source)+'</span></div>'+
                '<div class="m">'+esc(h.category)+' - '+esc(h.path)+'</div>'+
                '<div class="s">'+(h.snippet||'')+'</div>';
    d.onclick=()=>open(h.source,h.path,d);
    results.appendChild(d);
  });
}
// --- Update docs (re-fetch + reindex) ---
const upd=document.getElementById('upd'), updlog=document.getElementById('updlog');
let pollTimer=null;
async function pollUpdate(){
  let s; try{ s=await (await fetch('/api/update/status')).json(); }catch(e){ return; }
  if(s.running){
    upd.disabled=true;upd.textContent='Updating...';
    updlog.textContent=(s.log&&s.log.length)?s.log[s.log.length-1]:'';
  } else {
    if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
    upd.disabled=false;upd.textContent='Update docs';
    if(s.rc!==null){                       // an update actually completed
      updlog.textContent=(s.rc===0?'docs updated':'update finished (rc='+s.rc+')');
      loadCats(); if(q.value.trim()) search();
    }
  }
}
upd.onclick=async()=>{
  if(pollTimer) return;
  upd.disabled=true;upd.textContent='Updating...';updlog.textContent='starting...';
  await fetch('/api/update',{headers:{'X-Requested-With':'grimoire'}});
  pollTimer=setInterval(pollUpdate,1500); pollUpdate();
};
// resume showing progress if an update is already running (e.g. page reload)
pollUpdate();

q.addEventListener('input',()=>{clearTimeout(timer);timer=setTimeout(search,180);});
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==q){e.preventDefault();q.focus();}
  if(e.key==='Escape'){q.value='';q.focus();search();}
});
loadCats();
</script>
</body>
</html>
